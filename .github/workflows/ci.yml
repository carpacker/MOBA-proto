name: ci

# Mirror the local pre-push gate in the cloud: a /WX build + ctest on Windows/MSVC.
# Runs across Debug AND Release so the determinism golden is exercised over the full
# {/fp:precise, /fp:fast} x {Debug, Release} matrix the determinism contract requires
# (ADR-0002): the det_precise/det_fast suites build the same source under both float
# models, and this matrix adds the config axis on top.
on:
  push:
    branches: [main]
  pull_request:

# Newer pushes to a PR supersede in-flight runs for the same ref. NEVER cancel a
# main-branch run, though — each commit on main should get a completed CI result
# (a cancelled run is neither green nor a usable baseline).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  windows-msvc:
    name: windows-msvc (${{ matrix.config }})
    runs-on: windows-latest
    strategy:
      fail-fast: false          # want both Debug and Release signals, not just the first failure
      matrix:
        config: [Debug, Release]
    steps:
      - uses: actions/checkout@v5

      # MSVC is set up WITHOUT a third-party Node action: ilammy/msvc-dev-cmd has no
      # Node 24 release and GitHub is retiring Node 20 actions, so instead we discover
      # the VS install with vswhere and source vcvars64 in-line. This is Node-free and
      # robust across the windows-latest VS2022 -> VS2026 image migration, and mirrors
      # the local tools/hooks/ctest-gate.bat. One combined step because the vcvars env
      # does not persist across separate run: steps. `|| exit /b 1` propagates early
      # failures (cmd does not stop on error by default); the final ctest decides the job.
      - name: Build + test (${{ matrix.config }})
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set "VSPATH=%%i"
          if not defined VSPATH ( echo No Visual Studio install found & exit /b 1 )
          call "%VSPATH%\VC\Auxiliary\Build\vcvars64.bat" || exit /b 1
          cmake --version || exit /b 1
          ninja --version || exit /b 1
          cmake --preset ci || exit /b 1
          cmake --build build-ci --config ${{ matrix.config }} || exit /b 1
          ctest --test-dir build-ci -C ${{ matrix.config }} --output-on-failure --no-tests=error --output-junit "%CD%\ctest-${{ matrix.config }}.xml"

      # Render the per-test results into the GitHub run summary (native — no third-party
      # action, consistent with the Node-free setup). Reads the JUnit XML ctest wrote;
      # always() so a red run still reports. On an [xml] element $c.name is the TAG name,
      # so attributes are read via GetAttribute.
      - name: Test report (${{ matrix.config }})
        if: always()
        shell: pwsh
        run: |
          $xml = "ctest-${{ matrix.config }}.xml"
          $sum = $env:GITHUB_STEP_SUMMARY
          if (-not (Test-Path $xml)) { "No JUnit XML produced ($xml)." | Out-File -Append $sum; exit 0 }
          [xml]$doc = Get-Content $xml
          $cases = @($doc.SelectNodes('//testcase'))
          $fails = @($cases | Where-Object { $_.GetAttribute('status') -eq 'fail' -or $_.SelectSingleNode('failure') })
          $lines = @()
          $lines += "## Tests - ${{ matrix.config }}"
          $lines += ""
          $lines += "**$($cases.Count) tests, $($fails.Count) failed.**"
          $lines += ""
          $lines += "| Test | Result | Time (s) |"
          $lines += "|------|--------|----------|"
          foreach ($c in $cases) {
            $bad = ($c.GetAttribute('status') -eq 'fail') -or ($null -ne $c.SelectSingleNode('failure'))
            $icon = if ($bad) { ':x:' } else { ':white_check_mark:' }
            $lines += "| $($c.GetAttribute('name')) | $icon | $($c.GetAttribute('time')) |"
          }
          ($lines -join "`n") | Out-File -Append $sum
